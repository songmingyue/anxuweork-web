syntax = "proto3";

import "google/protobuf/any.proto";

message AdminLoginInputProto {
  string account = 1;
  string password = 2;
  string organizationID = 3;
  string rememberMe = 4;
}


message PageResponse {
  bool isSuccess = 1;
  string message = 2;
  PageBase pageBase = 3;
  repeated google.protobuf.Any data = 4; // 需要 Any 时使用
  int32 warnCode = 5;
} 

message AdminLoginUserInfoProto {
  string userUID = 1;
  string loginName = 2;
  string userName = 3;
  string workNO = 4;
  string officePhone = 5;
  string privatePhone = 6;
  string email = 7;
  string isSuperManager = 8;
  string organizationID = 9;
  string organizationName = 10;
  string deptID = 11;
  string deptName = 12;
  repeated ViewPartProto viewParts = 13;
  UserRightDtoProto UserRight = 14;
  string accessToken = 15;
  string isCurrentPageOpen = 16;
}

message ViewPartProto {
  string url = 1;
  repeated ChildrenProto children = 2;
  metaProto meta = 3;
}

message ChildrenProto {
  string url = 1;
  metaProto meta = 2;
}

message metaProto {
  bool requiresAuth = 1;
  string title = 2;
}

message UserRightDtoProto {
  string userUID = 1;
  ExamInfoRightProto examInfo = 2;
  ClinicInfoRightProto clinicInfo = 3;
  StatisticInfoRightProto statisticInfo = 4;
  DataRightProto data = 5;
  ReportPrintRightProto reportPrint = 6;
  DisplayStyleRightProto displayStyleRightInfo = 7;
}

message ExamInfoRightProto {
  string visible = 1;
  string doctorVisible = 2;
  string departmentVisible = 3;
  string organizationVisible = 4;
  string listVisible = 5;
  string checkChargeVisible = 6;
}

message ClinicInfoRightProto {
  string visible = 1;
  string doctorVisible = 2;
  string departmentVisible = 3;
  string organizationVisible = 4;
}

message StatisticInfoRightProto {
  string visible = 1;
  string doctorVisible = 2;
  string departmentVisible = 3;
  string organizationVisible = 4;
}

message DataRightProto {
  string requestVisible = 1;
  string reportVisible = 2;
  string imageVisible = 3;
  string filmVisible = 4;
  string isOpenUpload = 5;
  string editExamVisible = 6;
}

message ReportPrintRightProto {
  string ServiceSectIDs = 1;
}

message DisplayStyleRightProto {
  string ServiceSectIDs = 1;
}

message PageBase {
  int32 currentPage = 1;
  int32 pageSize = 2;
  int32 totalRecords = 3;
  string token = 4;
  int32 errorTimes = 5;
  int32 loginStatus = 6;
}
message BaseResponse {
  bool isSuccess = 1;                 // 是否成功
  string message = 2;                 // 提示信息
  string token = 3;                   // 可选的令牌
  google.protobuf.Any data = 4;       // 业务数据，使用 Any 包裹
}
message OrganizationDtoProto {
  string organizationID = 1;
  string organizationName = 2;
  repeated DeptMstDtoProto deptMstDto = 3;
}

message DeptMstDtoProto {
  string organizationID = 1;
  string deptName = 2;
  string deptID = 3;
  string organizationName = 4;
  string deptType = 5;
}

// 以下为 JSON 风格定义改写成的 proto3 messages

message OrganizationInputProto {
  string organizationName = 1;
  string organizationID   = 2;
  string deptType         = 3;
}

message DicItemMstProto {
  string typeCode          = 1;
  string itemCode          = 2;
  string organizationID    = 3;
  string itemName          = 4;
  string parentItemCode    = 5;
  string inputCode         = 6;
  string sortNO            = 7;
  string memo              = 8;
  string defaultFlag       = 9;
  string deleteFlag        = 10;
  string itemRepresen      = 11;
  string itemRepresenExt1  = 12;
  string itemRepresenExt2  = 13;
  string itemRepresenExt3  = 14;
  string itemRepresenExt4  = 15;
  string itemRepresenExt5  = 16;
  string itemRepresenExt6  = 17;
  string itemRepresenExt7  = 18;
  string itemRepresenExt8  = 19;
  string itemRepresenExt9  = 20;
  string itemRepresenExt10 = 21;
  string itemRepresenExt11 = 22;
  string itemRepresenExt12 = 23;
  string itemRepresenExt13 = 24;
  string itemRepresenExt14 = 25;
  string itemRepresenExt15 = 26;
  string itemRepresenExt16 = 27;
  string itemRepresenExt17 = 28;
  string itemRepresenExt18 = 29;
  string itemRepresenExt19 = 30;
  string itemRepresenExt20 = 31;
}

message UserOrgInfoProto {
  string userUID         = 1;
  string deptID          = 2;
  string deptName        = 3;
  string organizationID  = 4;
  string organizationName= 5;
  string isSuperManager  = 6;
  string loginName       = 7;
  string userName        = 8;
  string workNO          = 9;
  string officePhone     = 10;
  string privatePhone    = 11;
  string email           = 12;
}

message DicItemMstInputProto {
  string itemCode              = 1;
  string itemCodeScheme        = 2;
  string typeCode              = 3;
  int32  pageSize              = 4;
  int32  currentPage           = 5;
  string token                 = 6;
  string isInteragency         = 7;
  string isInteragencyExam     = 8;
  string isInteragencyClinic   = 9;
  string isInteragencyStatistic= 10;
  UserOrgInfoProto userInfo    = 11;
  string isInteragencyData     = 12;
}

message StorageInputProto {
  string mediaUID       = 1;
  int32  pageSize       = 2;
  int32  currentPage    = 3;
  string organizationID = 4;
}

message StorageTempProto {
  string mediaUID         = 1;
  string name             = 2;
  string type             = 3;
  string path             = 4;
  string organizationID   = 5;
  string subDir           = 6;
  string ifEnable         = 7;
  string customConfig     = 8;
  string description      = 9;
  string organizationName = 10;
  string bucket           = 11;
  string accessID         = 12;
  string accessKey        = 13;
  string isSharePath      = 14;
  string shareAddress     = 15;
  string shareUserName    = 16;
  string sharePassWord    = 17;
  string host             = 18;
  string uploadMediaUID   = 19;
  string userUID          = 20;
  string uploadURL        = 21;
  string downloadURL      = 22;
  string httpPath         = 23;
}

message RoleMstProto {
  string roleUID           = 1;
  string roleName          = 2;
  string createUserUID     = 3;
  string createUserName    = 4;
  string createDate        = 5;
  string memo              = 6;
  string organizationID    = 7;
  string organizationName  = 8;
}

message OrganizationIDInputProto {
  string organizationID = 1;
}

message UserMstInputProto {
  string userUID           = 1;
  string account           = 2;
  string password          = 3;
  string type              = 4;
  string name              = 5;
  string iDCardNO          = 6;
  string officePhone       = 7;
  string privatePhone      = 8;
  string email             = 9;
  string address           = 10;
  string status            = 11;  // 按原定义为 string
  string organizationID    = 12;
  string deptID            = 13;
  string workNO            = 14;
  string validityStartDate = 15;
  string validityEndDate   = 16;
  string createUserUID     = 17;
  string createUserName    = 18;
  string createDate        = 19;
  string lastLogonTime     = 20;
  string memo              = 21;
  string updateDate        = 22;
  int32  currentPage       = 23;
  int32  pageSize          = 24;
}

message UserMstInfoOutputProto {
  string userUID           = 1;
  string account           = 2;
  string password          = 3;
  string type              = 4;
  string name              = 5;
  string iDCardNO          = 6;
  string officePhone       = 7;
  string privatePhone      = 8;
  string email             = 9;
  string address           = 10;
  bool   status            = 11;  // 按原定义为 bool
  string organizationID    = 12;
  string deptID            = 13;
  string workNO            = 14;
  string validityStartDate = 15;
  string validityEndDate   = 16;
  string createUserUID     = 17;
  string createUserName    = 18;
  string createDate        = 19;
  string lastLogonTime     = 20;
  string memo              = 21;
  string updateDate        = 22;
  string userStatus        = 23;
  string organizationName  = 24;
  string deptName          = 25;
}


message SysParameterMstProto {
  string code = 1;
  string name = 2;
  string value = 3;
  string module = 4;
  string memo = 5;
}
message UserDisableInputProto {
  string userUID = 1;
  bool status = 2;
}

message UserResetInputProto {
  string userUID = 1;
  string account = 2;
  string organizationID = 3;
}

message UserMstEntityInputProto {
  string userUID = 1;
  string account = 2;
  string password = 3;
  string type = 4;
  string name = 5;
  string iDCardNO = 6;
  string officePhone = 7;
  string privatePhone = 8;
  string email = 9;
  string address = 10;
  string status = 11;
  string organizationID = 12;
  string deptID = 13;
  string workNO = 14;
  string validityStartDate = 15;
  string validityEndDate = 16;
  string createUserUID = 17;
  string createUserName = 18;
  string createDate = 19;
  string lastLogonTime = 20;
  string memo = 21;
  string rowTimestamp = 22;
  string updateDate = 23;
  string isSuperManager = 24;
}

message RoleMstInputProto {
  string roleUID = 1;          // 角色唯一标识
  string roleName = 2;        // 角色名称
  string createUserUID = 3;   // 创建者UID
  string createUserName = 4;   // 创建者姓名
  string createDate = 5;      // 创建时间（ISO 8601格式）
  string memo = 6;            // 备注信息
  string organizationID = 7;  // 所属组织ID
  int32 currentPage = 8;      // 当前页码（分页参数）
  int32 pageSize = 9;         // 每页记录数（分页参数）
}