// ================== Added OrgInputProto & OrganizationTreeProto ==================
// 原始 JSON/JS 定义转换为 proto3 message，保持字段顺序与类型
message OrgInputProto {
  string organizationName     = 1;  // 机构名称
  string searchOrganizationID = 2;  // 查询使用的组织ID
  string deptType             = 3;  // 科室类型
}

message OrganizationTreeProto {
  string searchOrganizationID  = 1;  // 查询组织ID
  string organizationName      = 2;  // 机构名称
  string alias                 = 3;  // 别名
  string inputCode             = 4;  // 输入码
  string contactUserName       = 5;  // 联系人
  string officePhoneNO         = 6;  // 办公电话
  string personalPhoneNO       = 7;  // 个人电话
  string email                 = 8;  // 邮箱
  string address               = 9;  // 地址
  string organizationTypeCode  = 10; // 机构类型代码
  string parentOrganizationID  = 11; // 上级机构ID
  string createUserUID         = 12; // 创建人UID
  string createDate            = 13; // 创建时间
  string memo                  = 14; // 备注
  string deleteFlag            = 15; // 删除标记
  string organizationCode      = 16; // 机构编码
  string province              = 17; // 省
  string city                  = 18; // 市
  string district              = 19; // 区/县
  int32  sortNO                = 20; // 排序号
  repeated OrganizationTreeProto children = 21; // 子节点
  int32  defaultShareDuration  = 22; // 默认共享时长
  string cardBackgroundColour  = 23; // 卡片背景色
  string logoURL               = 24; // Logo 地址
  string backGroundURL         = 25; // 背景图地址
}

message DeptMstInputProto {
  string searchOrganizationID = 1;  // 搜索用组织ID
  string deptID = 2;               // 部门ID
  string deptName = 3;             // 部门名称
  int32 pageSize = 4;              // 每页数据量
  int32 currentPage = 5;           // 当前页码
}

message DeptMstInfoProto {
  string deptID = 1;               // 部门ID（唯一标识）
  string deptOrganizationID = 2;   // 所属组织ID
  string deptName = 3;            // 部门名称
  string officePhoneNO = 4;       // 办公电话
  string inputCode = 5;           // 输入码（如拼音首字母）
  string memo = 6;                // 备注信息
  string deleteFlag = 7;          // 删除标记（"是"/"否"或布尔值更佳）
  string rowTimestamp = 8;         // 行时间戳（建议改用int64表示毫秒时间戳）
  string deptType = 9;            // 部门类型编码
  string examClass = 10;          // 检查分类编码
  string alias = 11;              // 部门别名
  string deptTypeName = 12;       // 部门类型名称（可考虑与deptType合并为枚举）
  string examClassName = 13;      // 检查分类名称
}

message OrganizationMstProto {
  string searchOrganizationID = 1;     // 搜索用组织ID
  string organizationName = 2;        // 组织名称
  string alias = 3;                    // 组织别名
  string inputCode = 4;                // 输入码（如拼音首字母）
  string contactUserName = 5;          // 联系人姓名
  string officePhoneNO = 6;            // 办公电话
  string personalPhoneNO = 7;         // 个人电话
  string email = 8;                    // 邮箱地址
  string address = 9;                  // 详细地址
  string organizationTypeCode = 10;    // 组织类型编码
  string parentOrganizationID = 11;    // 父组织ID（"-1"表示根节点）
  string createUserUID = 12;            // 创建者UUID
  string createDate = 13;              // 创建时间（格式：YYYY-MM-DD HH:mm:ss）
  string memo = 14;                    // 备注信息
  string deleteFlag = 15;              // 删除标记（"是"/"否"）
  string rowTimestamp = 16;           // 行时间戳（建议改用int64）
  string organizationCode = 17;        // 组织机构代码
  string province = 18;               // 省份
  string city = 19;                   // 城市
  string district = 20;               // 区县
  string sortNO = 21;                  // 排序号（可优化为int32）
  int32 defaultShareDuration = 22;     // 默认共享时长（数字类型）
  string cardBackgroundColour = 23;     // 卡片背景色（十六进制，如"#FFFFFF"）
  string logoURL = 24;                 // Logo URL路径
  string backGroundURL = 25;           // 背景图URL路径
}

message StorageDtoProto {
  string mediaUID = 1;                // 媒体资源唯一标识
  string name = 2;                   // 存储配置名称
  string type = 3;                   // 存储类型（如云存储/本地存储）
  string path = 4;                   // 存储路径或域名
  string organizationID = 5;         // 所属组织ID
  string subDir = 6;                 // 子目录路径
  string ifEnable = 7;               // 是否启用（建议改用bool类型）
  string customConfig = 8;           // 自定义配置（JSON字符串）
  string description = 9;            // 描述信息
  string host = 10;                  // 服务主机地址
  string bucket = 11;                // 存储桶名称
  string accessID = 12;              // 访问密钥ID（敏感信息）
  string accessKey = 13;             // 访问密钥（需加密存储）
  string isSharePath = 14;           // 是否为共享路径（建议改用bool）
  string shareAddress = 15;          // 共享地址
  string shareUserName = 16;          // 共享用户名
  string sharePassWord = 17;         // 共享密码（需加密）
  string uploadMediaUID = 18;        // 上传媒体资源唯一标识
  string userUID = 19;               // 用户唯一标识
  string uploadURL = 20;            // 文件上传地址
  string downloadURL = 21;           // 文件下载地址
  string httpPath = 22;              // HTTP访问路径
}